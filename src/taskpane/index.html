<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Speak Logic</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: "Segoe UI", "Inter", sans-serif; color: #1B1B1B; background: #FAFAFA; }
      #root { height: 100vh; overflow-y: auto; }

      /* Modern thin scrollbars — no arrows, rounded thumb */
      * { scrollbar-width: thin; scrollbar-color: #C7C7C7 transparent; }
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #C7C7C7; border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover { background: #A0A0A0; }
      ::-webkit-scrollbar-button { display: none; width: 0; height: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
